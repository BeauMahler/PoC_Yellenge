<!DOCTYPE html>
<html lang="en">
    <head>
        <title>PoC Yellenge</title>
        <link rel="stylesheet" type="text/css" href="style.css"/>
        <script type="text/javascript" src="actions.js"></script>
    </head>
    <body onload="getEventData()">
        <div class="header">
            <h1 id="eventName">EventNaam</h1>
            <table id="eventDetailTable">
                <tbody>
                    <tr><th class="detailTableHeader">Intro:</th><td id="eventIntro"></td></tr>
                    <tr><th class="detailTableHeader">Datum:</th><td id="eventDates"></td></tr>
                    <tr><th class="detailTableHeader">Land(en):</th><td id="eventCountries"></td></tr>
                    <tr><th class="detailTableHeader">Sector(en):</th><td id="eventSectors"></td></tr>
                    <tr><th class="detailTableHeader">Targets:</th><td id="eventTargets"></td></tr>
                    <tr><th class="detailTableHeader">Tags:</th><td id="eventTags"></td></tr>
                    <tr><th class="detailTableHeader">Officiële pagina:</th><td id="eventUrl"></td></tr>
                </tbody>
            </table>
        </div>
    </body>
</html>
